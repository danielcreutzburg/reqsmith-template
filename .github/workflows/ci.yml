name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check removed dependencies
        run: npm run check:deps

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        env:
          # Dummy values for the build — real values are only needed at runtime
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: dummy-publishable-key
          VITE_SUPABASE_PROJECT_ID: dummy-project-id
        run: npm run build
